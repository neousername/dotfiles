input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(aeaeb259) rgba(6e6e7359) 45deg
    check_color=rgba(aeaeb2ee) rgba(6e6e73ee) 120deg
    fail_color=rgba(ff453aee) rgba(ff453aee) 40deg

    font_color = rgb(229, 229, 234)
    font_family = Inter
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center

    placeholder_text = Input password
}
