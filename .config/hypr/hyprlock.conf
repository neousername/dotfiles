$col_outer = rgba(255, 255, 255, 0.35)
$col_inner = rgba(255, 255, 255, 0.12)
$col_text  = rgb(255, 255, 255)
$col_check = rgb(174, 174, 178)
$col_label = rgba(242, 243, 244, 0.65)

background {
    color = rgb(0, 0, 0)
    blur_passes = 0
    brightness = 1
}

general {
    hide_cursor = true
}

input-field {
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    outer_color = $col_outer
    inner_color = $col_inner
    font_color = $col_text
    fade_on_empty = false
    check_color = $col_check
    placeholder_text =
    position = 0, -100
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = $col_label
    font_size = 22
    font_family = Inter
    position = 0, 80
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $col_label
    font_size = 95
    font_family = Inter
    position = 0, 0
    halign = center
    valign = center
}
