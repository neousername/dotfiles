[mgr]
ratio = [0, 3, 4]
linemode = "size"

[opener]
play = [
    { run = "celluloid %s", orphan = true }
]
image = [
    { run = "imv-dir %s", orphan = true }
]
pdf = [
    { run = "zathura %s", orphan = true }
]
edit = [
    { run = "nvim %s", block = true }
]
open = [
    { run = "xdg-open %s", orphan = true }
]

[open]
prepend_rules = [
    { mime = "image/*", use = "image" },
    { mime = "application/pdf", use = "pdf" }
]

[plugin]
previewers = [
  { url = "*/",             run = "folder", sync = true },  # directories
  { mime = "application/json", run = "json" },              # JSON → formatted
  { mime = "text/*",        run = "code" },                 # other text → highlighted
  { url = "*",              run = "file" },                 # everything else
]
preloaders = []
