[mgr]
ratio = [0, 3, 4]

[opener]
play = [
    { run = "celluloid %s", orphan = true }
]
image = [
    { run = "imv %s", orphan = true }
]
pdf = [
    { run = "zathura %s", orphan = true }
]
edit = [
    { run = "nvim %s", block = true }
]
open = [
    { run = "xdg-open %s", orphan = true }
]

[open]
prepend_rules = [
    { mime = "image/*", use = "image" },
    { mime = "application/pdf", use = "pdf" }
]

# Alacritty does not support image previews
previewers = [
  { url = "*/", run = "folder", sync = true },  # directory view
  { url = "*",  run = "file" },                 # file info (fallback)
]
preloaders = []
